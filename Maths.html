<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bytestrom Mathematiks</title>

<!-- Rel Icon -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="https://i.imgur.com/NLz6Jfd.png">

<style>
body {
    margin: 0;
    height: 100vh;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    width: 380px;
    background: #0f172a;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(56,189,248,0.25);
}

h1 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 10px;
}

p {
    text-align: center;
    font-size: 14px;
    color: #cbd5f5;
}

.section {
    margin-top: 15px;
}

.row {
    display: flex;
    gap: 6px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
}

input, select {
    background: #020617;
    color: white;
    border: 1px solid #334155;
}

button {
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.result {
    margin-top: 18px;
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    font-size: 16px;
    min-height: 60px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Bytestrom Mathematiks</h1>
    <p>Brüche → Dezimalzahlen → Rechnung</p>

    <div class="section">
        <b>Zahl 1</b>
        <div class="row">
            <input id="g1" type="number" placeholder="Ganz">
            <input id="z1" type="number" placeholder="Zähler">
            <input id="n1" type="number" placeholder="Nenner">
        </div>
    </div>

    <div class="section">
        <select id="op">
            <option value="+">+</option>
            <option value="-">−</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>
    </div>

    <div class="section">
        <b>Zahl 2</b>
        <div class="row">
            <input id="g2" type="number" placeholder="Ganz">
            <input id="z2" type="number" placeholder="Zähler">
            <input id="n2" type="number" placeholder="Nenner">
        </div>
    </div>

    <button onclick="rechnen()">Berechnen</button>

    <div class="result" id="result"></div>
</div>

<script>
function toDecimal(g, z, n) {
    if (!n) return null;
    return g + (z / n);
}

function rechnen() {
    const g1 = Number(document.getElementById("g1").value) || 0;
    const z1 = Number(document.getElementById("z1").value) || 0;
    const n1 = Number(document.getElementById("n1").value);

    const g2 = Number(document.getElementById("g2").value) || 0;
    const z2 = Number(document.getElementById("z2").value) || 0;
    const n2 = Number(document.getElementById("n2").value);

    const op = document.getElementById("op").value;
    const result = document.getElementById("result");

    if (!n1 || !n2) {
        result.innerHTML = "❌ Nenner darf nicht 0 sein";
        return;
    }

    const d1 = toDecimal(g1, z1, n1);
    const d2 = toDecimal(g2, z2, n2);

    let calc;

    if (op === "+") calc = d1 + d2;
    if (op === "-") calc = d1 - d2;
    if (op === "*") calc = d1 * d2;
    if (op === "/") {
        if (d2 === 0) {
            result.innerHTML = "❌ Division durch 0";
            return;
        }
        calc = d1 / d2;
    }

    result.innerHTML = `
        <b>Umwandlung:</b><br>
        ${g1} ${z1}/${n1} = ${d1}<br>
        ${g2} ${z2}/${n2} = ${d2}<br><br>
        <b>Ergebnis:</b><br>
        ${d1} ${op} ${d2} = <b>${calc}</b>
    `;

}
</script>

</body>
</html>
